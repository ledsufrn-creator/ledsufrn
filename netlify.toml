[build]
  publish = "."

# Sem redirect catch-all — Netlify serve os arquivos estáticos das subpastas
# (index.html em cada diretório) automaticamente. Um redirect /* -> /index.html
# quebraria as páginas de /equipe/*, /iniciativas/*, etc.

[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
